<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Ohrny — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
<style>
/* ============ TOKENS ============ */
:root{
  --bg:         oklch(0.17 0.008 260);
  --bg-elev:    oklch(0.205 0.010 260);
  --bg-elev-2:  oklch(0.235 0.012 260);
  --bg-hover:   oklch(0.26  0.014 260);
  --line:       oklch(0.30  0.012 260);
  --line-soft:  oklch(0.26  0.010 260);
  --text:       oklch(0.96  0.005 260);
  --text-dim:   oklch(0.72  0.010 260);
  --text-mute:  oklch(0.55  0.010 260);

  --accent:     oklch(0.72 0.15 25);     /* coral */
  --accent-soft:oklch(0.72 0.15 25 / .14);
  --accent-ink: oklch(0.22 0.08 25);

  --ok:   oklch(0.78 0.14 155);
  --ok-soft: oklch(0.78 0.14 155 / .14);
  --warn: oklch(0.82 0.14 80);
  --warn-soft: oklch(0.82 0.14 80 / .14);
  --bad:  oklch(0.70 0.19 25);
  --bad-soft: oklch(0.70 0.19 25 / .14);
  --info: oklch(0.75 0.12 235);
  --info-soft: oklch(0.75 0.12 235 / .14);

  --radius: 10px;
  --radius-sm: 6px;
  --pad: 20px;
  --row-h: 44px;

  --font-sans: 'Inter', system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
}
[data-density="compact"]{
  --pad: 14px;
  --row-h: 36px;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
a{color:inherit;text-decoration:none}
input,select,textarea{font:inherit;color:inherit}
::selection{background:var(--accent-soft);color:var(--text)}

/* ============ LAYOUT ============ */
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
[data-sidebar="collapsed"] .app{grid-template-columns:64px 1fr}

/* ============ SIDEBAR ============ */
.sidebar{
  border-right:1px solid var(--line-soft);
  background:oklch(0.155 0.008 260);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
}
.brand{
  display:flex;align-items:center;gap:10px;
  padding:18px 18px 16px;
  border-bottom:1px solid var(--line-soft);
}
.brand-mark{
  width:28px;height:28px;border-radius:8px;
  background:
    radial-gradient(circle at 30% 30%, oklch(0.80 0.17 25), oklch(0.55 0.17 25));
  position:relative;flex:none;
  box-shadow:inset 0 -1px 0 rgba(0,0,0,.25), 0 1px 0 rgba(255,255,255,.05);
}
.brand-mark::after{
  content:"";position:absolute;inset:6px;border-radius:4px;
  background:radial-gradient(circle at 70% 60%, transparent 55%, oklch(0.40 0.12 25) 58%);
  mix-blend-mode:overlay;opacity:.6;
}
.brand-text{font-weight:700;letter-spacing:-.01em}
.brand-sub{font-size:11px;color:var(--text-mute);font-family:var(--font-mono);margin-top:1px}
[data-sidebar="collapsed"] .brand-text,
[data-sidebar="collapsed"] .brand-sub,
[data-sidebar="collapsed"] .nav-label,
[data-sidebar="collapsed"] .nav-section-label,
[data-sidebar="collapsed"] .side-foot{display:none}
[data-sidebar="collapsed"] .brand{justify-content:center;padding:18px 0}
[data-sidebar="collapsed"] .nav-item{justify-content:center;padding:10px 0}
[data-sidebar="collapsed"] .nav-badge{display:none}

.nav{padding:10px 10px;overflow-y:auto;flex:1}
.nav-section-label{
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-mute);padding:14px 10px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:7px;
  color:var(--text-dim);font-weight:500;
  position:relative;cursor:pointer;
}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--text)}
.nav-item.active::before{
  content:"";position:absolute;left:-10px;top:8px;bottom:8px;width:2px;
  background:var(--accent);border-radius:2px;
}
.nav-label{flex:1;white-space:nowrap;overflow:hidden}
.nav-badge{
  font-size:10.5px;padding:1px 6px;border-radius:999px;
  background:var(--bg-elev-2);color:var(--text-dim);
  font-family:var(--font-mono);font-weight:500;
}
.nav-badge.hot{background:var(--bad-soft);color:var(--bad)}
.nav .ico{
  width:16px;height:16px;flex:none;color:var(--text-mute);
  display:inline-flex;align-items:center;justify-content:center;
}
.nav-item.active .ico{color:var(--accent)}

.side-foot{
  border-top:1px solid var(--line-soft);
  padding:12px;display:flex;align-items:center;gap:10px;
}
.avatar{
  width:30px;height:30px;border-radius:50%;flex:none;
  background:linear-gradient(135deg, oklch(0.60 0.12 25), oklch(0.50 0.10 300));
  font-weight:600;font-size:12px;display:flex;align-items:center;justify-content:center;color:white;
  border:1px solid var(--line);
}
.side-foot .who{font-size:12.5px;font-weight:600;line-height:1.2}
.side-foot .role{font-size:11px;color:var(--text-mute);font-family:var(--font-mono)}

/* ============ TOP BAR ============ */
.topbar{
  display:flex;align-items:center;gap:12px;
  height:56px;padding:0 20px;
  border-bottom:1px solid var(--line-soft);
  background:var(--bg);
  position:sticky;top:0;z-index:10;
}
.crumbs{font-size:13px;color:var(--text-dim);font-weight:500;display:flex;align-items:center;gap:6px}
.crumbs b{color:var(--text);font-weight:600}
.crumbs .sep{color:var(--text-mute)}
.topbar-spacer{flex:1}
.search{
  display:flex;align-items:center;gap:8px;
  background:var(--bg-elev);border:1px solid var(--line-soft);
  padding:6px 10px;border-radius:8px;min-width:300px;color:var(--text-dim);
}
.search input{background:transparent;border:0;outline:0;flex:1;color:var(--text);font-size:13px}
.search kbd{
  font-family:var(--font-mono);font-size:10.5px;
  padding:1px 5px;border-radius:4px;background:var(--bg-elev-2);
  color:var(--text-mute);border:1px solid var(--line-soft);
}
.top-btn{
  width:32px;height:32px;border-radius:7px;
  border:1px solid var(--line-soft);background:var(--bg-elev);
  display:inline-flex;align-items:center;justify-content:center;color:var(--text-dim);
  position:relative;
}
.top-btn:hover{background:var(--bg-hover);color:var(--text)}
.top-btn .dot{position:absolute;top:7px;right:7px;width:6px;height:6px;background:var(--accent);border-radius:50%;border:1.5px solid var(--bg-elev)}
.env-badge{
  font-family:var(--font-mono);font-size:11px;
  padding:3px 8px;border-radius:5px;
  background:var(--warn-soft);color:var(--warn);
  border:1px solid color-mix(in oklch, var(--warn) 30%, transparent);
  white-space:nowrap;flex:none;
}

/* ============ MAIN ============ */
.main{min-width:0;background:var(--bg)}
.page{padding:24px 28px 80px;max-width:1500px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:20px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.015em;margin:0}
.page-sub{color:var(--text-dim);font-size:13px;margin-top:4px}
.page-actions{display:flex;gap:8px;align-items:center}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 12px;border-radius:7px;
  background:var(--bg-elev);border:1px solid var(--line-soft);
  color:var(--text-dim);font-weight:500;font-size:13px;
  white-space:nowrap;
}
.btn:hover{background:var(--bg-hover);color:var(--text)}
.btn.primary{
  background:var(--accent);color:oklch(0.18 0.04 25);border-color:transparent;
  font-weight:600;
}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent}
.btn.danger{background:var(--bad-soft);color:var(--bad);border-color:transparent}

.seg{
  display:inline-flex;padding:2px;gap:2px;
  background:var(--bg-elev);border:1px solid var(--line-soft);border-radius:7px;
}
.seg button{
  padding:5px 10px;border-radius:5px;font-size:12.5px;color:var(--text-dim);font-weight:500;
}
.seg button.on{background:var(--bg-elev-2);color:var(--text);box-shadow:inset 0 0 0 1px var(--line)}

/* ============ PANELS / CARDS ============ */
.panel{
  background:var(--bg-elev);border:1px solid var(--line-soft);
  border-radius:var(--radius);
}
.panel-head{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;border-bottom:1px solid var(--line-soft);
}
.panel-title{font-size:13px;font-weight:600;letter-spacing:-.005em}
.panel-sub{font-size:12px;color:var(--text-mute)}
.panel-body{padding:18px}
.panel-foot{padding:10px 18px;border-top:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;color:var(--text-mute);font-size:12px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi{
  background:var(--bg-elev);border:1px solid var(--line-soft);
  border-radius:var(--radius);padding:16px 18px 14px;position:relative;overflow:hidden;
}
.kpi-label{font-size:11.5px;color:var(--text-mute);letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.kpi-value{font-family:var(--font-mono);font-size:28px;font-weight:600;letter-spacing:-.02em;margin-top:10px;line-height:1}
.kpi-delta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-family:var(--font-mono);margin-top:10px}
.kpi-delta.up{color:var(--ok)}
.kpi-delta.down{color:var(--bad)}
.kpi-spark{position:absolute;right:14px;bottom:10px;opacity:.85}

/* Grid */
.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-12{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}

/* Chart containers */
.chart{width:100%;display:block}
.y-axis text,.x-axis text{font-family:var(--font-mono);font-size:10px;fill:var(--text-mute)}
.grid-line{stroke:var(--line-soft);stroke-dasharray:2 3}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{
  text-align:left;font-weight:500;color:var(--text-mute);
  font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  padding:10px 14px;border-bottom:1px solid var(--line-soft);
  background:oklch(0.19 0.01 260);position:sticky;top:0;
}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle;height:var(--row-h)}
.tbl tr:last-child td{border-bottom:0}
.tbl tr:hover td{background:oklch(0.22 0.012 260 / .4);cursor:pointer}
.tbl .mono{font-family:var(--font-mono);font-size:12.5px;color:var(--text-dim)}
.tbl .right{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--font-mono)}

/* Chips / badges */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11.5px;font-weight:500;
  padding:2px 8px;border-radius:999px;
  background:var(--bg-elev-2);color:var(--text-dim);
  border:1px solid var(--line-soft);
  line-height:1.5;
}
.chip.ok{background:var(--ok-soft);color:var(--ok);border-color:transparent}
.chip.warn{background:var(--warn-soft);color:var(--warn);border-color:transparent}
.chip.bad{background:var(--bad-soft);color:var(--bad);border-color:transparent}
.chip.info{background:var(--info-soft);color:var(--info);border-color:transparent}
.chip.accent{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.chip .ddot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* Avatar photo placeholder */
.photo{
  width:32px;height:32px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:white;
  background-size:cover;flex:none;border:1px solid var(--line);
}

/* Filter bar */
.filters{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
.filter-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:999px;border:1px dashed var(--line);
  color:var(--text-dim);font-size:12px;
}
.filter-chip.on{border-style:solid;background:var(--bg-elev-2);color:var(--text)}

/* Drawer */
.drawer-backdrop{
  position:fixed;inset:0;background:oklch(0.12 0.01 260 / .6);z-index:40;
  opacity:0;pointer-events:none;transition:opacity .18s ease;
}
.drawer{
  position:fixed;top:0;right:0;height:100vh;width:460px;max-width:95vw;z-index:41;
  background:var(--bg-elev);border-left:1px solid var(--line);
  transform:translateX(100%);transition:transform .22s ease;
  display:flex;flex-direction:column;
}
.drawer.open{transform:translateX(0)}
.drawer-backdrop.open{opacity:1;pointer-events:auto}
.drawer-head{padding:16px 20px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:10px}
.drawer-body{padding:18px 20px;overflow-y:auto;flex:1}

/* Toggle */
.switch{
  --w:34px;--h:20px;
  width:var(--w);height:var(--h);background:var(--bg-elev-2);
  border:1px solid var(--line);border-radius:999px;position:relative;
  transition:background .15s;flex:none;cursor:pointer;
}
.switch::after{
  content:"";position:absolute;top:1px;left:1px;
  width:calc(var(--h) - 4px);height:calc(var(--h) - 4px);
  background:var(--text-dim);border-radius:50%;transition:all .15s;
}
.switch.on{background:var(--accent)}
.switch.on::after{left:calc(var(--w) - var(--h) + 1px);background:oklch(0.98 0 0)}

/* Range */
input[type=range].slider{
  -webkit-appearance:none;appearance:none;width:100%;background:transparent;height:18px;
}
input[type=range].slider::-webkit-slider-runnable-track{height:4px;background:var(--bg-elev-2);border-radius:4px}
input[type=range].slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;height:14px;width:14px;border-radius:50%;
  background:var(--accent);margin-top:-5px;border:2px solid var(--bg);box-shadow:0 0 0 1px var(--accent);
}
input[type=range].slider::-moz-range-track{height:4px;background:var(--bg-elev-2);border-radius:4px}
input[type=range].slider::-moz-range-thumb{
  height:14px;width:14px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);
}

/* Page content sections */
.section{display:none}
.section.active{display:block}

/* Tweaks panel */
.tweaks{
  position:fixed;right:18px;bottom:18px;z-index:50;
  width:280px;background:var(--bg-elev);border:1px solid var(--line);
  border-radius:12px;box-shadow:0 20px 60px -20px rgba(0,0,0,.8);
  display:none;overflow:hidden;
}
.tweaks.open{display:block}
.tweaks-head{
  padding:12px 14px;border-bottom:1px solid var(--line-soft);
  display:flex;align-items:center;justify-content:space-between;
  font-weight:600;font-size:13px;
}
.tweaks-body{padding:12px 14px;display:flex;flex-direction:column;gap:14px}
.tweak-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px;color:var(--text-dim)}
.swatches{display:flex;gap:6px}
.sw{width:20px;height:20px;border-radius:50%;border:1px solid var(--line);cursor:pointer;position:relative}
.sw.on{box-shadow:0 0 0 2px var(--bg), 0 0 0 3px var(--text)}

/* mini helpers */
.row{display:flex;align-items:center;gap:10px}
.col{display:flex;flex-direction:column}
.gap-sm{gap:6px}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.mt-20{margin-top:20px}
.mb-8{margin-bottom:8px}
.muted{color:var(--text-mute)}
.dim{color:var(--text-dim)}
.mono{font-family:var(--font-mono)}
.tnum{font-variant-numeric:tabular-nums}
hr.div{border:0;border-top:1px solid var(--line-soft);margin:16px 0}

/* Bars for bar charts */
.barlist{display:flex;flex-direction:column;gap:10px}
.barlist .bar-row{display:grid;grid-template-columns:140px 1fr 70px;gap:12px;align-items:center;font-size:12.5px}
.barlist .bar-track{height:6px;background:var(--bg-elev-2);border-radius:3px;overflow:hidden}
.barlist .bar-fill{height:100%;background:var(--accent);border-radius:3px}

/* Funnel */
.funnel{display:flex;flex-direction:column;gap:6px}
.funnel .step{
  display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;
  padding:10px 14px;border-radius:8px;background:var(--bg-elev-2);
  position:relative;overflow:hidden;
}
.funnel .step::before{
  content:"";position:absolute;left:0;top:0;bottom:0;background:var(--accent-soft);width:var(--w,100%);
}
.funnel .step>*{position:relative}
.funnel .step .lbl{font-size:13px;font-weight:500}
.funnel .step .num{font-family:var(--font-mono);font-size:13px;color:var(--text-dim)}
.funnel .step .pct{font-family:var(--font-mono);font-size:11px;color:var(--text-mute);margin-left:8px}

/* world/cohort grid */
.heat{display:grid;gap:3px;grid-template-columns:repeat(24,1fr)}
.heat .cell{aspect-ratio:1;border-radius:2px;background:var(--bg-elev-2)}

/* Tabs */
.tabs{display:flex;gap:4px;padding:0 14px;border-bottom:1px solid var(--line-soft)}
.tab{padding:10px 12px;font-size:13px;color:var(--text-dim);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;font-weight:500}
.tab.on{color:var(--text);border-bottom-color:var(--accent)}

/* Moderation card */
.mod-card{
  display:grid;grid-template-columns:120px 1fr auto;gap:14px;align-items:center;
  padding:14px;border-bottom:1px solid var(--line-soft);
}
.mod-thumb{width:120px;height:120px;border-radius:8px;background:var(--bg-elev-2);position:relative;overflow:hidden;border:1px solid var(--line-soft)}
.mod-thumb::after{
  content:attr(data-label);position:absolute;inset:auto 6px 6px 6px;
  font-family:var(--font-mono);font-size:10px;color:var(--text-mute);
  background:oklch(0.12 0.005 260 / .8);padding:2px 5px;border-radius:3px;text-align:center;
}
.mod-thumb.stripes{background:
  repeating-linear-gradient(135deg, var(--bg-elev-2) 0 8px, var(--bg-elev) 8px 16px);
}
.mod-flags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.mod-actions{display:flex;flex-direction:column;gap:6px}

/* Small icons (inline SVG sized) */
.i{width:16px;height:16px;flex:none}
.i-sm{width:13px;height:13px;flex:none}

/* Workspace dropdown */
.ws-menu{
  position:absolute;top:calc(100% + 4px);left:10px;right:10px;z-index:50;
  background:var(--bg-elev);border:1px solid var(--line);
  border-radius:10px;padding:6px;
  box-shadow:0 20px 50px -20px rgba(0,0,0,.8);
}
.ws-head{
  font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-mute);padding:8px 10px 6px;font-weight:600;
}
.ws-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;
}
.ws-item:hover{background:var(--bg-hover)}
.ws-item.on{background:var(--accent-soft)}
.ws-icon{
  width:30px;height:30px;border-radius:7px;flex:none;
  display:inline-flex;align-items:center;justify-content:center;color:white;
}
.ws-icon.admin{background:linear-gradient(135deg, oklch(0.55 0.12 260), oklch(0.40 0.12 260))}
.ws-icon.op{background:linear-gradient(135deg, oklch(0.70 0.17 25), oklch(0.50 0.17 25))}
.ws-title{font-size:13px;font-weight:500;line-height:1.2}
.ws-sub{font-size:11px;color:var(--text-mute);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-foot{
  font-size:10.5px;color:var(--text-mute);
  padding:8px 10px 4px;border-top:1px solid var(--line-soft);margin-top:4px;
}

/* Print hide */
@media (max-width:1100px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .grid-2,.grid-3{grid-template-columns:1fr}
}

/* ============ PLANS & LIMITS ============ */
.plan-tabs{
  display:flex;gap:2px;margin-bottom:18px;
  border-bottom:1px solid var(--line-soft);
}
.plan-tab{
  padding:10px 16px;font-size:13px;color:var(--text-dim);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  cursor:pointer;font-weight:500;
}
.plan-tab:hover{color:var(--text)}
.plan-tab.on{color:var(--text);border-bottom-color:var(--accent)}

.tier-strip{
  display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;
}
.tier-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 12px;border-radius:7px;
  background:var(--bg-elev);border:1px solid var(--line-soft);
  font-size:12.5px;
}

/* Limits table — tier columns + 1 label column */
.limits-table{
  background:var(--bg-elev);border:1px solid var(--line-soft);
  border-radius:var(--radius);overflow:hidden;
}
.lt-head{
  display:grid;grid-template-columns:280px repeat(4,1fr);gap:0;
  background:oklch(0.19 0.01 260);border-bottom:1px solid var(--line-soft);
  font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-mute);
  font-weight:600;
}
.lt-head > div{padding:12px 14px;border-right:1px solid var(--line-soft)}
.lt-head > div:last-child{border-right:0}
.lt-tier-head{display:flex;align-items:center}

.lt-row{
  display:grid;grid-template-columns:280px repeat(4,1fr);gap:0;
  border-bottom:1px solid var(--line-soft);
}
.lt-row:last-of-type{border-bottom:0}
.lt-row:hover{background:oklch(0.21 0.01 260 / .4)}

.lt-meta{
  padding:14px;border-right:1px solid var(--line-soft);
  background:oklch(0.19 0.01 260 / .4);
}
.lt-icon{
  width:24px;height:24px;border-radius:6px;
  background:var(--bg-elev-2);color:var(--text-dim);
  display:inline-flex;align-items:center;justify-content:center;flex:none;
}
.lt-note{
  font-size:11px;color:var(--accent);margin-top:6px;font-style:italic;line-height:1.4;
}

.lt-cell{
  padding:14px;border-right:1px solid var(--line-soft);
  display:flex;flex-direction:column;gap:6px;
}
.lt-cell:last-child{border-right:0}
.lt-val{display:flex;align-items:baseline;gap:4px}
.lt-num{
  font-family:var(--font-mono);font-size:22px;font-weight:600;letter-spacing:-.02em;
  line-height:1;
}
.lt-unit{font-family:var(--font-mono);font-size:11px;color:var(--text-mute)}
.lt-slider{width:100%;cursor:pointer;height:4px}
.lt-slider:disabled{opacity:.35;cursor:not-allowed}
.lt-foot{
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;
}
.lt-unl{
  display:inline-flex;align-items:center;gap:5px;font-size:10.5px;
  color:var(--text-mute);cursor:pointer;justify-self:center;
}
.lt-unl input{accent-color:var(--accent);cursor:pointer}

.lt-summary{
  display:flex;gap:10px;padding:14px 16px;
  background:var(--accent-soft);color:var(--text);
  font-size:12.5px;line-height:1.5;
  border-top:1px solid var(--line-soft);
}
.lt-summary svg{color:var(--accent);flex:none;margin-top:2px}

/* Gates */
.gates{
  background:var(--bg-elev);border:1px solid var(--line-soft);
  border-radius:var(--radius);overflow:hidden;
}
.gate-row{
  display:grid;grid-template-columns:280px repeat(4,1fr);gap:0;
  border-bottom:1px solid var(--line-soft);
}
.gate-row:last-child{border-bottom:0}
.gate-meta{
  padding:16px 14px;border-right:1px solid var(--line-soft);
  background:oklch(0.19 0.01 260 / .4);
}
.gate-cell{
  padding:14px;border-right:1px solid var(--line-soft);
  display:flex;flex-direction:column;gap:8px;align-items:flex-start;
}
.gate-cell:last-child{border-right:0}
.gate-tier-label{
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;
}
.gate-select{
  background:var(--bg-elev-2);border:1px solid var(--line-soft);
  color:var(--text);border-radius:6px;padding:5px 8px;font-size:12px;
  outline:0;cursor:pointer;width:100%;font-family:inherit;
}

/* Toggle switch */
.toggle{
  width:36px;height:20px;border-radius:999px;
  border:0;background:var(--bg-elev-2);position:relative;cursor:pointer;
  transition:background .15s ease;padding:0;
}
.toggle .toggle-dot{
  position:absolute;top:2px;left:2px;width:16px;height:16px;
  background:white;border-radius:50%;
  transition:transform .15s ease;
  box-shadow:0 1px 2px rgba(0,0,0,.3);
}
.toggle.on .toggle-dot{transform:translateX(16px)}

/* Revenue tab */
.rev-summary{
  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;
}
.rev-tile{
  background:var(--bg-elev);border:1px solid var(--line-soft);
  border-radius:var(--radius);padding:16px 18px;
}
.rev-label{
  font-size:11px;color:var(--text-mute);text-transform:uppercase;
  letter-spacing:.06em;font-weight:600;
}
.rev-val{
  font-size:26px;font-weight:600;letter-spacing:-.02em;margin:8px 0 4px;line-height:1;
}

.price-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
}
.price-card{
  background:var(--bg-elev);border:1px solid var(--line-soft);
  border-radius:var(--radius);padding:18px;
  display:flex;flex-direction:column;gap:14px;
}
.price-badge{
  font-family:var(--font-mono);font-size:11px;
  background:var(--bg-elev-2);padding:3px 8px;border-radius:5px;color:var(--text-mute);
}
.price-edit{display:flex;flex-direction:column;gap:5px}
.price-input-row{
  display:flex;align-items:center;gap:6px;
  background:var(--bg-elev-2);border:1px solid var(--line-soft);
  border-radius:7px;padding:8px 10px;
}
.price-input-row:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.price-input-row input{
  flex:1;background:transparent;border:0;outline:0;
  font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--text);
  width:100%;
}
.price-input-row input:disabled{opacity:.5}
.price-currency{font-family:var(--font-mono);color:var(--text-mute);font-size:14px}
.price-row{
  display:flex;justify-content:space-between;font-size:12.5px;
  padding:6px 0;border-bottom:1px dashed var(--line-soft);
}
.price-row:last-child{border-bottom:0}

/* Rollout */
.rollout-row{
  display:flex;gap:12px;align-items:flex-start;padding:12px 14px;
  background:var(--bg-elev-2);border:1px solid var(--line-soft);
  border-radius:8px;cursor:pointer;
}
.rollout-row:hover{background:var(--bg-hover)}
.rollout-row input{margin-top:3px;accent-color:var(--accent)}

.audit-list{display:flex;flex-direction:column}
.audit-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:12.5px;
}
.audit-row:last-child{border-bottom:0}

@media (max-width: 1280px){
  .lt-head, .lt-row, .gate-row{grid-template-columns:220px repeat(4,1fr)}
  .price-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
